apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-traefik
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: 37.3.0
    helm:
      valueFiles:
      - $values/values/my-traefik.yaml
  - repoURL: https://github.com/Kimjibeom/argocd-apps.git
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
