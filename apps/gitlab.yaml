apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - repoURL: https://charts.gitlab.io/
    chart: gitlab
    targetRevision: 9.6.0
    helm:
      valueFiles:
      - $values/values/gitlab.yaml
  - repoURL: https://github.com/Kimjibeom/argocd-apps.git
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab
  syncPolicy:
#    automated:
#      prune: true
#      selfHeal: true
    syncOptions:
    - CreateNamespace=true
