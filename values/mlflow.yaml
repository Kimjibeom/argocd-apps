affinity: {}
artifactRoot:
  azureBlob:
    accessKey: ""
    connectionString: ""
    container: ""
    enabled: false
    path: ""
    storageAccount: ""
  defaultArtifactRoot: /data
  defaultArtifactsDestination: /data
  gcs:
    bucket: ""
    enabled: false
    path: ""
  proxiedArtifactStorage: true
  s3:
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
    bucket: ""
    enabled: false
    existingSecret:
      keyOfAccessKeyId: ""
      keyOfSecretAccessKey: ""
      name: ""
    path: ""
auth:
  adminPassword: ""
  adminUsername: ""
  appName: basic-auth
  authorizationFunction: mlflow.server.auth:authenticate_request_basic_auth
  configFile: basic_auth.ini
  configPath: /etc/mlflow/auth/
  defaultPermission: READ
  enabled: false
  existingAdminSecret:
    name: ""
    passwordKey: password
    usernameKey: username
  postgres:
    database: ""
    driver: ""
    enabled: false
    existingSecret:
      name: ""
      passwordKey: password
      usernameKey: username
    host: ""
    password: ""
    port: 5432
    user: ""
  sqliteFile: basic_auth.db
  sqliteFullPath: ""
autoscaling:
  behavior: {}
  enabled: false
  maxReplicas: 5
  metrics:
  - resource:
      name: memory
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  - resource:
      name: cpu
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 1
backendStore:
  databaseConnectionCheck: false
  databaseMigration: true
  defaultSqlitePath: ':memory:'
  existingDatabaseSecret:
    name: ""
    passwordKey: password
    usernameKey: username
  mssql:
    database: ""
    driver: pymssql
    enabled: false
    host: ""
    password: ""
    port: 1433
    user: ""
  mysql:
    database: ""
    driver: pymysql
    enabled: false
    host: ""
    password: ""
    port: 3306
    user: ""
  postgres:
    database: mlflow
    driver: ""
    enabled: true
    host: mlflow-db-postgresql
    password: mlflow-password
    port: 5432
    user: mlflow
extraArgs:
  gunicornOpts: --forwarded-allow-ips '*'
  host: 0.0.0.0
  port: "5000"
extraContainers: []
extraEnvVars: {}
extraFlags: []
extraPodLabels: {}
extraSecretNamesForEnvFrom: []
extraVolumeMounts:
- mountPath: /data
  name: artifact-volume
extraVolumes:
- name: artifact-volume
  persistentVolumeClaim:
    claimName: mlflow-pvc
flaskServerSecretKey: ""
fullnameOverride: ""
image:
  pullPolicy: IfNotPresent
  repository: burakince/mlflow
  tag: 3.4.0
imagePullSecrets: []
ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  className: traefik
  enabled: true
  hosts:
  - host: mlflow.gpu.com
    paths:
    - path: /
      pathType: Prefix
  tls: []
initContainers: []
initImages:
  dbchecker:
    pullPolicy: IfNotPresent
    repository: busybox
    tag: "1.32"
  iniFileInitializer:
    pullPolicy: IfNotPresent
    repository: busybox
    tag: "1.32"
  mlflowDbMigration:
    pullPolicy: IfNotPresent
    repository: burakince/mlflow
    tag: 3.4.0
ldapAuth:
  adminGroupDistinguishedName: ""
  enabled: false
  encodedTrustedCACertificate: ""
  externalSecretForTrustedCACertificate: ""
  groupAttribute: dn
  groupAttributeKey: ""
  lookupBind: ""
  searchBaseDistinguishedName: ""
  searchFilter: (&(objectclass=groupOfUniqueNames)(uniquemember=%s))
  tlsVerification: required
  uri: ""
  userGroupDistinguishedName: ""
livenessProbe:
  failureThreshold: 5
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
log:
  enabled: true
  level: info
mysql:
  architecture: standalone
  auth:
    database: mlflow
    password: ""
    username: ""
  enabled: false
  image:
    repository: bitnamilegacy/mysql
  primary:
    persistence:
      enabled: true
      existingClaim: ""
    service:
      ports:
        mysql: 3306
nameOverride: ""
nodeSelector: {}
podAnnotations: {}
podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch
postgresql:
  architecture: standalone
  auth:
    database: mlflow
    password: mlflow-password
    username: mlflow
  enabled: false
  image:
    repository: bitnamilegacy/postgresql
  primary:
    persistence:
      enabled: true
      existingClaim: ceph-block
    service:
      ports:
        postgresql: 5432
readinessProbe:
  failureThreshold: 5
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
replicaCount: 1
resources: {}
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  privileged: false
  readOnlyRootFilesystem: false
  runAsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001
service:
  annotations: {}
  containerPort: 5000
  containerPortName: mlflow
  enabled: true
  name: http
  port: 80
  type: ClusterIP
serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ""
serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: prometheus-stack
  metricRelabelings: []
  namespace: monitoring
  targetLabels: []
  telemetryPath: /metrics
  timeout: 10s
  useServicePort: false
strategy:
  rollingUpdate:
    maxSurge: 100%
    maxUnavailable: 0
  type: RollingUpdate
telemetry:
  enabled: false
tolerations: []
