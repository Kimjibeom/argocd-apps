      upstream-keepalive-timeout: 5
      use-http2: "true"
    electionID: ingress-controller-leader
    image:
      digest: sha256:695d79381ee6af00c7f5c9fd434f50851d7d32838ad5b2c507e416cf2084fc79
      image: gitlab-org/cloud-native/mirror/images/ingress-nginx/controller
