# harbor-values.yaml

# 1. 외부 노출 및 Ingress 설정 (Traefik)
expose:
  type: ingress
  tls:
    enabled: true
    certSource: auto  # Harbor 내부용 인증서 자동 생성
  ingress:
    hosts:
      core: harbor.ssg.local  # [수정] 접속할 도메인
    className: "traefik"      # [수정] Traefik Ingress Class 지정
    annotations:
      # Traefik HTTPS 라우팅 및 업로드 용량 제한 해제
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"

# 2. 외부 접속 URL (필수)
# 위 Ingress host와 프로토콜(https)을 맞춰야 합니다.
externalURL: https://harbor.ssg.local

# 3. 데이터 저장소 설정 (Rook-Ceph Block Storage 연결)
persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: "ceph-block"   # [수정] Rook-Ceph Block Class
      accessMode: ReadWriteOnce
      size: 50Gi                   # 이미지 저장 공간 (필요시 증설)
    jobservice:
      storageClass: "ceph-block"
      accessMode: ReadWriteOnce
      size: 10Gi
    database:
      storageClass: "ceph-block"
      accessMode: ReadWriteOnce
      size: 10Gi
    redis:
      storageClass: "ceph-block"
      accessMode: ReadWriteOnce
      size: 10Gi
    trivy:
      storageClass: "ceph-block"
      accessMode: ReadWriteOnce
      size: 10Gi

# 4. 관리자 비밀번호 설정
harborAdminPassword: "Harbor12345"

# 5. 내부 DB 비밀번호 (보안 권장)
database:
  internal:
    password: "postgres_password"

# 6. 내부 Redis 비밀번호 (보안 권장)
redis:
  internal:
    password: "redis_password"
