          - memory
          controlledValues: RequestsAndLimits
          maxAllowed: {}
          minAllowed: {}
      updatePolicy: null
  dnsPolicy: ClusterFirst
  enableStatefulSetAutoDeletePVC: false
  extraAnnotations: {}
  extraContainers: []
  extraLabels: {}
  hostNetwork: false
  hostPID: false
  initContainers: []
  minReadySeconds: 10
  nodeSelector: {}
  parallelRollout: true
  podAnnotations: {}
  podDisruptionBudget:
