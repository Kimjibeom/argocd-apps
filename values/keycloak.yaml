# keycloak-values.yaml

# 1. 관리자 및 운영 설정
keycloak:
  adminUser: "admin"
  adminPassword: "keycloak_password"

  # 운영 모드 설정
  production: true
  proxyHeaders: "xforwarded"          # Traefik 연동을 위한 헤더 설정
  httpEnabled: true                   # Traefik <-> Keycloak 구간은 HTTP

  # 접속 도메인
  hostname: "keycloak.ssg.local"

# 2. 데이터베이스 설정 (내장 Postgres 사용)
database:
  type: postgres  # [핵심] mariadb -> postgres 변경
  # host, port 등은 비워두면 차트가 알아서 내장 DB를 바라봅니다.

# 3. 내장 PostgreSQL 활성화 (핵심)
postgres:
  enabled: true   # [핵심] 내장 DB 컨테이너를 띄웁니다.
  auth:
    database: "keycloak"
    username: "keycloak"
    password: "db_password_1234"

  # [중요] 내장 DB 데이터 영구 저장 (Rook-Ceph)
  # 이 설정이 없으면 파드 재시작 시 데이터가 날아갑니다.
  persistence:
    enabled: true
    storageClass: "ceph-block"        # Rook-Ceph Block Class
    size: 5Gi
    accessModes:
      - ReadWriteOnce

# 4. 외부 노출 (Traefik Ingress)
ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: keycloak.ssg.local
      paths:
        - path: /
          pathType: Prefix

# 5. Keycloak 자체 파일 저장소 (선택 사항)
persistence:
  enabled: true
  storageClass: "ceph-block"
  size: 2Gi
  accessModes:
    - ReadWriteOnce

# 6. 리소스 제한
resources:
  limits:
    memory: 1Gi
    cpu: 1000m
  requests:
    memory: 512Mi
    cpu: 200m
